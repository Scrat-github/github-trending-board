<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending 看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0; border-bottom: 1px solid #30363d; margin-bottom: 40px; }
    h1 { font-size: 32px; color: #58a6ff; margin-bottom: 8px; }
    .subtitle { color: #8b949e; font-size: 14px; }
    .update-time { color: #238636; font-size: 13px; margin-top: 8px; }
    .project-list { display: grid; gap: 16px; }
    .project-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; transition: transform 0.2s; }
    .project-card:hover { transform: translateX(4px); border-color: #58a6ff; }
    .project-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .rank { width: 32px; height: 32px; background: #238636; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .project-name { font-size: 18px; font-weight: 600; color: #58a6ff; text-decoration: none; }
    .project-name:hover { text-decoration: underline; }
    .project-desc { color: #8b949e; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #8b949e; }
    .stat-icon { width: 16px; height: 16px; fill: #8b949e; }
    .stat-value { color: #c9d1d9; font-weight: 600; }
    .videos { margin-top: 16px; padding-top: 16px; border-top: 1px solid #30363d; }
    .videos-title { font-size: 13px; color: #58a6ff; margin-bottom: 12px; font-weight: 600; }
    .video-list { display: grid; gap: 8px; }
    .video-item { display: flex; align-items: center; gap: 12px; padding: 8px; background: #0d1117; border-radius: 6px; text-decoration: none; color: #c9d1d9; transition: background 0.2s; }
    .video-item:hover { background: #21262d; }
    .video-thumbnail { width: 80px; height: 45px; background: #30363d; border-radius: 4px; object-fit: cover; }
    .video-title { font-size: 13px; line-height: 1.4; flex: 1; }
    .no-videos { color: #8b949e; font-size: 13px; font-style: italic; }
    footer { text-align: center; padding: 40px 0; color: #8b949e; font-size: 13px; border-top: 1px solid #30363d; margin-top: 40px; }
    @media (max-width: 600px) { .project-header { flex-wrap: wrap; } .stats { gap: 12px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 GitHub Trending 看板</h1>
      <p class="subtitle">自动捕捉热门项目和教学视频</p>
      <p class="update-time" id="updateTime">更新时间：加载中...</p>
    </header>
    
    <main class="project-list" id="projectList">
      <p style="text-align: center; color: #8b949e;">加载中...</p>
    </main>
    
    <footer>
      <p>数据来自 GitHub Trending • 每日自动更新</p>
    </footer>
  </div>
  
  <script>
    async function load() {
      try {
        const res = await fetch('data/trending.json');
        const data = await res.json();
        
        document.getElementById('updateTime').textContent = '更新时间：' + new Date(data.updatedAt).toLocaleString('zh-CN');
        
        const list = document.getElementById('projectList');
        list.innerHTML = data.projects.map((p, i) => `
          <div class="project-card">
            <div class="project-header">
              <span class="rank">${i + 1}</span>
              <a class="project-name" href="${p.url}" target="_blank">${p.name}</a>
            </div>
            <p class="project-desc">${p.description || '暂无描述'}</p>
            <div class="stats">
              <span class="stat">
                <svg class="stat-icon" viewBox="0 0 16 16"><path d="M8 .25a7.77 7.77 0 017.75 7.78 7.75 7.75 0 01-1.88 5.05 7.77 7.77 0 01-5.85 2.67c-4.28 0-7.75-3.47-7.75-7.75A7.75 7.75 0 018 .25zm0 1.5a6.25 6.25 0 100 12.5A6.25 6.25 0 008 1.75z"/></svg>
                <span class="stat-value">${(p.stars / 1000).toFixed(1)}k</span> stars
              </span>
              <span class="stat">
                <svg class="stat-icon" viewBox="0 0 16 16"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 111.5 0v.878a2.25 2.25 0 01-2.25 2.25h-1.5v2.128a2.251 2.251 0 11-1.5 0V8.5h-1.5A2.25 2.25 0 013.5 6.25v-.878a2.25 2.25 0 111.5 0z"/></svg>
                <span class="stat-value">${p.todayStars || 0}</span> today
              </span>
              <span class="stat">
                <svg class="stat-icon" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>
                <span class="stat-value">${p.language || 'N/A'}</span>
              </span>
            </div>
            ${p.videos && p.videos.length > 0 ? `
              <div class="videos">
                <div class="videos-title">📺 相关视频 (${p.videos.length})</div>
                <div class="video-list">
                  ${p.videos.map(v => `
                    <a class="video-item" href="${v.url}" target="_blank">
                      <img class="video-thumbnail" src="${v.thumbnail}" alt="${v.title}">
                      <span class="video-title">${v.title}</span>
                    </a>
                  `).join('')}
                </div>
              </div>
            ` : '<p class="no-videos">暂无相关视频</p>'}
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('projectList').innerHTML = '<p style="text-align: center; color: #f85149;">加载失败，请稍后重试</p>';
        console.error(error);
      }
    }
    
    load();
  </script>
</body>
</html>
